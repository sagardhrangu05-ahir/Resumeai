# =============================================
# ResumeAI — Nginx Config for Docker
# "yourdomain.in" ને તારા real domain થી replace કર
# =============================================

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.in www.yourdomain.in;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name yourdomain.in www.yourdomain.in;

    # SSL Certificate paths (Certbot generate કરશે)
    ssl_certificate     /etc/nginx/ssl/live/yourdomain.in/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/yourdomain.in/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # File upload limit (PDF upload માટે)
    client_max_body_size 10M;

    # Proxy to Next.js app
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;   # AI generation time માટે
    }

    # Static files cache
    location /_next/static/ {
        proxy_pass http://app:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
